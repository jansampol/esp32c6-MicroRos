<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamri Robot Portal</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 40px; }
        .card-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            width: 200px;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card:hover {
            transform: translateY(-5px);
            background: #333;
            border-color: #666;
        }
        .icon { font-size: 40px; margin-bottom: 15px; display: block;}
        .title { font-size: 1.2em; font-weight: bold; display: block; margin-bottom: 5px;}
        .desc { font-size: 0.8em; color: #aaa; }
    </style>
</head>
<body>
    <h1>Mamri Robot Portal</h1>
    
    <div class="card-container">
        <a href="/julian/index.html" class="card">
            <span class="title">Julian</span>
            <span class="desc">Julian's webpage</span>
        </a>

        <a href="/tom/index.html" class="card">
            <span class="title">Tom</span>
            <span class="desc">Tom's webpage</span>
        </a>
    </div>
</body>
</html>
